<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoToolbox - 加解密工具箱</title>
<style>
:root {
    --bg: #ffffff;
    --bg-card: #f8f9fa;
    --bg-input: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #6c757d;
    --border: #dee2e6;
    --primary: #4361ee;
    --primary-hover: #3a56d4;
    --accent: #7209b7;
    --success: #06d6a0;
    --danger: #ef476f;
    --warning: #ffd166;
    --shadow: rgba(0,0,0,0.08);
    --cat-active: #4361ee;
    --cat-active-text: #ffffff;
    --algo-active: #4361ee;
    --algo-active-text: #ffffff;
    --radius: 10px;
}

[data-theme="dark"] {
    --bg: #0f0f23;
    --bg-card: #1a1a3e;
    --bg-input: #16163a;
    --text: #e0e0e0;
    --text-secondary: #8888aa;
    --border: #2a2a5a;
    --primary: #6c63ff;
    --primary-hover: #5a52e0;
    --accent: #b388ff;
    --success: #69f0ae;
    --danger: #ff5252;
    --warning: #ffd740;
    --shadow: rgba(0,0,0,0.3);
    --cat-active: #6c63ff;
    --cat-active-text: #ffffff;
    --algo-active: #6c63ff;
    --algo-active-text: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
}

/* Header */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
}

.header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* Theme toggle */
.theme-toggle {
    width: 50px;
    height: 26px;
    border-radius: 13px;
    background: var(--border);
    cursor: pointer;
    position: relative;
    transition: background 0.3s;
    border: none;
}

.theme-toggle::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--primary);
    top: 2px;
    left: 2px;
    transition: transform 0.3s;
}

[data-theme="dark"] .theme-toggle::after {
    transform: translateX(24px);
}

.theme-label {
    font-size: 13px;
    color: var(--text-secondary);
}

/* Main layout */
.main {
    max-width: 1100px;
    margin: 24px auto;
    padding: 0 24px;
}

/* Category tabs */
.categories {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.cat-btn {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
}

.cat-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
}

.cat-btn.active {
    background: var(--cat-active);
    color: var(--cat-active-text);
    border-color: var(--cat-active);
}

/* Algorithm chips */
.algorithms {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.algo-btn {
    padding: 6px 16px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}

.algo-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
}

.algo-btn.active {
    background: var(--algo-active);
    color: var(--algo-active-text);
    border-color: var(--algo-active);
}

/* Work area */
.work-area {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: 0 2px 12px var(--shadow);
    border: 1px solid var(--border);
}

.input-group {
    margin-bottom: 16px;
}

.input-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.input-group textarea,
.input-group input[type="text"],
.input-group input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg-input);
    color: var(--text);
    font-size: 14px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    transition: border-color 0.2s;
    resize: vertical;
}

.input-group textarea:focus,
.input-group input:focus {
    outline: none;
    border-color: var(--primary);
}

.input-group textarea {
    min-height: 100px;
}

.key-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
}

.key-row .input-group {
    flex: 1;
}

.key-toggle {
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg-input);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    margin-bottom: 16px;
    height: 44px;
    width: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.key-toggle:hover {
    border-color: var(--primary);
    color: var(--primary);
}

/* Action buttons */
.actions {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.action-btn {
    padding: 10px 28px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}

.action-btn.primary {
    background: var(--primary);
    color: #fff;
}

.action-btn.primary:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
}

.action-btn.secondary {
    background: var(--accent);
    color: #fff;
}

.action-btn.secondary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.action-btn.outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
}

.action-btn.outline:hover {
    border-color: var(--primary);
    color: var(--primary);
}

.action-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
}

/* Result */
.result-area {
    position: relative;
}

.result-area textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg-input);
    color: var(--text);
    font-size: 14px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    min-height: 100px;
    resize: vertical;
}

.result-area textarea:focus {
    outline: none;
    border-color: var(--primary);
}

.copy-btn {
    position: absolute;
    top: 34px;
    right: 8px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
    z-index: 2;
}

.copy-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
}

.copy-btn.copied {
    background: var(--success);
    color: #fff;
    border-color: var(--success);
}

/* Toast */
.toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    z-index: 9999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
}

.toast.show {
    transform: translateY(0);
    opacity: 1;
}

.toast.success {
    background: var(--success);
    color: #000;
}

.toast.error {
    background: var(--danger);
    color: #fff;
}

/* Loading spinner */
.spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Info badge */
.info-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 8px;
}

.info-badge.two-way {
    background: rgba(67, 97, 238, 0.15);
    color: var(--primary);
}

.info-badge.one-way {
    background: rgba(239, 71, 111, 0.15);
    color: var(--danger);
}

/* Swap button */
.swap-btn {
    padding: 8px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
}

.swap-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    transform: rotate(180deg);
}

/* Responsive */
@media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .header h1 { font-size: 18px; }
    .main { padding: 0 12px; margin: 16px auto; }
    .work-area { padding: 16px; }
    .key-row { flex-direction: column; }
    .key-toggle { width: 100%; }
    .actions { flex-direction: column; }
    .action-btn { width: 100%; justify-content: center; }
}

/* Algo description tooltip */
.algo-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 16px;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 6px;
    border-left: 3px solid var(--primary);
}
</style>
</head>
<body data-theme="dark">

<div class="header">
    <h1>CryptoToolbox</h1>
    <div class="header-right">
        <span class="theme-label" id="themeLabel">Dark</span>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme"></button>
    </div>
</div>

<div class="main">
    <!-- Category tabs -->
    <div class="categories" id="categories"></div>

    <!-- Algorithm chips -->
    <div class="algorithms" id="algorithms"></div>

    <!-- Algorithm description -->
    <div class="algo-desc" id="algoDesc" style="display:none;"></div>

    <!-- Work area -->
    <div class="work-area">
        <div class="input-group">
            <label>Input</label>
            <textarea id="inputText" placeholder="Enter text here..."></textarea>
        </div>

        <div id="keySection" style="display:none;">
            <div class="key-row">
                <div class="input-group">
                    <label>Key / Secret</label>
                    <input type="password" id="keyInput" placeholder="Enter key...">
                </div>
                <button class="key-toggle" id="keyToggle" title="Show/Hide key">
                    <span id="keyIcon">&#128065;</span>
                </button>
            </div>
        </div>

        <!-- bcrypt verify section -->
        <div id="bcryptHashSection" style="display:none;">
            <div class="input-group">
                <label>bcrypt Hash (for verification)</label>
                <input type="text" id="bcryptHash" placeholder="$2b$12$...">
            </div>
        </div>

        <div class="actions" id="actionBtns"></div>

        <button class="swap-btn" id="swapBtn" title="Swap input/output">&#8645;</button>

        <div class="result-area">
            <label style="display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px;">Output</label>
            <textarea id="outputText" readonly placeholder="Result will appear here..."></textarea>
            <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ALGO_DATA = {
    symmetric: {
        label: '对称加密',
        algorithms: {
            'aes-128-cbc': { name: 'AES-128-CBC', needs_key: true, desc: 'AES 128位密钥，CBC模式，PKCS7填充。输出Base64格式（IV+密文）' },
            'aes-256-cbc': { name: 'AES-256-CBC', needs_key: true, desc: 'AES 256位密钥，CBC模式，PKCS7填充。输出Base64格式（IV+密文）' },
            '3des-cbc':    { name: '3DES-CBC', needs_key: true, desc: '三重DES，CBC模式，24字节密钥（由输入密钥SHA-256派生）' },
            'rc4':         { name: 'RC4', needs_key: true, desc: 'RC4流密码，输出Base64格式。注意：RC4已不推荐用于生产环境' },
            'sm4-cbc':     { name: 'SM4-CBC', needs_key: true, desc: 'SM4国密算法，CBC模式，128位密钥，PKCS7填充' }
        }
    },
    encoding: {
        label: '编码/解码',
        algorithms: {
            'base64': { name: 'Base64', needs_key: false, desc: 'Base64编码，将二进制数据编码为可打印ASCII字符' },
            'url':    { name: 'URL编码', needs_key: false, desc: 'URL百分号编码，用于URL中的特殊字符转义' },
            'hex':    { name: 'Hex编码', needs_key: false, desc: '十六进制编码，将每个字节转换为两位十六进制数' }
        }
    },
    hash: {
        label: '哈希(单向)',
        algorithms: {
            'md5':         { name: 'MD5', needs_key: false, desc: '128位哈希，已不推荐用于安全场景，仅用于校验' },
            'sha1':        { name: 'SHA-1', needs_key: false, desc: '160位哈希，已被破解，不建议用于安全场景' },
            'sha256':      { name: 'SHA-256', needs_key: false, desc: 'SHA-2系列 256位哈希，目前广泛使用的安全哈希' },
            'sha512':      { name: 'SHA-512', needs_key: false, desc: 'SHA-2系列 512位哈希，更高安全性' },
            'sha3-256':    { name: 'SHA-3-256', needs_key: false, desc: 'SHA-3 (Keccak) 256位，新一代安全哈希标准' },
            'hmac-sha256': { name: 'HMAC-SHA256', needs_key: true, desc: '基于SHA-256的消息认证码，需要密钥。用于验证消息完整性和来源' }
        }
    },
    password_hash: {
        label: '密码哈希',
        algorithms: {
            'bcrypt': { name: 'bcrypt', needs_key: false, desc: '自适应密码哈希函数，内置盐值，可调节计算强度。支持生成哈希和验证密码' }
        }
    }
};

const CATEGORY_ACTIONS = {
    symmetric:     ['encrypt', 'decrypt'],
    encoding:      ['encode', 'decode'],
    hash:          ['hash'],
    password_hash: ['hash', 'verify']
};

const ACTION_LABELS = {
    encrypt: { label: '加密', cls: 'primary', icon: '&#128274;' },
    decrypt: { label: '解密', cls: 'secondary', icon: '&#128275;' },
    encode:  { label: '编码', cls: 'primary', icon: '&#8594;' },
    decode:  { label: '解码', cls: 'secondary', icon: '&#8592;' },
    hash:    { label: '哈希', cls: 'primary', icon: '#' },
    verify:  { label: '验证', cls: 'secondary', icon: '&#10003;' }
};

let currentCategory = 'symmetric';
let currentAlgorithm = 'aes-256-cbc';
let isLoading = false;

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
    renderCategories();
    selectCategory('symmetric');
    initTheme();
    bindEvents();
});

function renderCategories() {
    const el = document.getElementById('categories');
    el.innerHTML = '';
    for (const [key, cat] of Object.entries(ALGO_DATA)) {
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (key === currentCategory ? ' active' : '');
        btn.textContent = cat.label;
        btn.onclick = () => selectCategory(key);
        el.appendChild(btn);
    }
}

function selectCategory(cat) {
    currentCategory = cat;
    renderCategories();
    const algos = Object.keys(ALGO_DATA[cat].algorithms);
    selectAlgorithm(algos[0]);
    renderAlgorithms();
}

function renderAlgorithms() {
    const el = document.getElementById('algorithms');
    el.innerHTML = '';
    const cat = ALGO_DATA[currentCategory];
    for (const [key, algo] of Object.entries(cat.algorithms)) {
        const btn = document.createElement('button');
        btn.className = 'algo-btn' + (key === currentAlgorithm ? ' active' : '');
        btn.textContent = algo.name;
        btn.onclick = () => selectAlgorithm(key);
        el.appendChild(btn);
    }
}

function selectAlgorithm(algo) {
    currentAlgorithm = algo;
    renderAlgorithms();

    const info = ALGO_DATA[currentCategory].algorithms[algo];

    // Show/hide key section
    const keySection = document.getElementById('keySection');
    keySection.style.display = info.needs_key ? 'block' : 'none';

    // Show/hide bcrypt verify hash input
    const bcryptSection = document.getElementById('bcryptHashSection');
    bcryptSection.style.display = (algo === 'bcrypt') ? 'block' : 'none';

    // Description
    const descEl = document.getElementById('algoDesc');
    descEl.style.display = 'block';
    let badge = '';
    if (currentCategory === 'hash') {
        badge = '<span class="info-badge one-way">单向</span>';
    } else if (currentCategory === 'password_hash') {
        badge = '<span class="info-badge one-way">单向 + 可验证</span>';
    } else {
        badge = '<span class="info-badge two-way">可逆</span>';
    }
    descEl.innerHTML = `<strong>${info.name}</strong>${badge} &mdash; ${info.desc}`;

    // Action buttons
    renderActions();
}

function renderActions() {
    const el = document.getElementById('actionBtns');
    el.innerHTML = '';
    const actions = CATEGORY_ACTIONS[currentCategory];
    for (const act of actions) {
        const info = ACTION_LABELS[act];
        const btn = document.createElement('button');
        btn.className = `action-btn ${info.cls}`;
        btn.innerHTML = `<span>${info.icon}</span> ${info.label}`;
        btn.onclick = () => doProcess(act);
        el.appendChild(btn);
    }

    // Clear button
    const clearBtn = document.createElement('button');
    clearBtn.className = 'action-btn outline';
    clearBtn.textContent = 'Clear';
    clearBtn.onclick = clearAll;
    el.appendChild(clearBtn);
}

async function doProcess(action) {
    if (isLoading) return;

    const inputText = document.getElementById('inputText').value.trim();
    if (!inputText) {
        showToast('Please enter input text', 'error');
        return;
    }

    let key = document.getElementById('keyInput').value;

    // For bcrypt verify, key is the hash to verify against
    if (currentAlgorithm === 'bcrypt' && action === 'verify') {
        key = document.getElementById('bcryptHash').value.trim();
        if (!key) {
            showToast('Please enter bcrypt hash for verification', 'error');
            return;
        }
    }

    setLoading(true);

    try {
        const resp = await fetch('/api/process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                algorithm: currentAlgorithm,
                action: action,
                input: inputText,
                key: key
            })
        });

        const data = await resp.json();

        if (data.error) {
            showToast(data.error, 'error');
            document.getElementById('outputText').value = 'Error: ' + data.error;
        } else {
            document.getElementById('outputText').value = data.result;
            showToast('Done!', 'success');
        }
    } catch (err) {
        showToast('Request failed: ' + err.message, 'error');
    } finally {
        setLoading(false);
    }
}

function setLoading(loading) {
    isLoading = loading;
    const btns = document.querySelectorAll('.action-btn');
    btns.forEach(btn => {
        btn.disabled = loading;
    });
}

function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('outputText').value = '';
    document.getElementById('keyInput').value = '';
    document.getElementById('bcryptHash').value = '';
}

function bindEvents() {
    // Copy button
    document.getElementById('copyBtn').addEventListener('click', () => {
        const text = document.getElementById('outputText').value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'Copy';
                btn.classList.remove('copied');
            }, 1500);
        });
    });

    // Key toggle
    document.getElementById('keyToggle').addEventListener('click', () => {
        const input = document.getElementById('keyInput');
        const icon = document.getElementById('keyIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '&#128064;';
        } else {
            input.type = 'password';
            icon.innerHTML = '&#128065;';
        }
    });

    // Swap input/output
    document.getElementById('swapBtn').addEventListener('click', () => {
        const inp = document.getElementById('inputText');
        const out = document.getElementById('outputText');
        const tmp = inp.value;
        inp.value = out.value;
        out.value = tmp;
    });

    // Theme toggle
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            const actions = CATEGORY_ACTIONS[currentCategory];
            doProcess(actions[0]);
        }
    });
}

// ── Theme ──
function initTheme() {
    const saved = localStorage.getItem('crypto-theme') || 'dark';
    document.body.setAttribute('data-theme', saved);
    updateThemeLabel(saved);
}

function toggleTheme() {
    const current = document.body.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('crypto-theme', next);
    updateThemeLabel(next);
}

function updateThemeLabel(theme) {
    document.getElementById('themeLabel').textContent = theme === 'dark' ? 'Dark' : 'Light';
}

// ── Toast ──
function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type + ' show';
    setTimeout(() => {
        el.classList.remove('show');
    }, 2500);
}
</script>
</body>
</html>
